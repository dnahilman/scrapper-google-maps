name: scrapper

# Single-host stack: PostgreSQL + master + 2 worker.
# Use docker-compose.worker.yml on remote VPS to join as additional workers.

services:
  postgres:
    image: postgres:16-alpine
    pull_policy: missing
    restart: unless-stopped
    environment:
      POSTGRES_USER: scrapper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: scrapper
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrapper -d scrapper"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  master:
    image: ghcr.io/dnahilman/scrapper-master:${TAG:-dev}
    pull_policy: build
    build:
      context: ..
      dockerfile: deploy/master.Dockerfile
      args:
        VERSION: ${TAG:-dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://scrapper:${POSTGRES_PASSWORD}@postgres:5432/scrapper?sslmode=disable
      HTTP_ADDR: ":8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      MASTER_TOKEN: ${MASTER_TOKEN:?required}
      EMSIFA_BASE_URL: https://emsifa.github.io/api-wilayah-indonesia/api
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - data:/app/data
    ports:
      - "8080:8080"

  worker:
    image: ghcr.io/dnahilman/scrapper-worker:${TAG:-dev}
    pull_policy: build
    build:
      context: ..
      dockerfile: deploy/worker.Dockerfile
    restart: unless-stopped
    depends_on:
      master:
        condition: service_started
    environment:
      MASTER_URL: http://master:8080
      MASTER_TOKEN: ${MASTER_TOKEN}
      WORKER_NAME: ${WORKER_NAME:-local-worker}
      MAX_CONCURRENCY: ${MAX_CONCURRENCY:-2}
      HEADLESS: "true"
      MIN_DELAY_SEC: ${MIN_DELAY_SEC:-8}
      MAX_DELAY_SEC: ${MAX_DELAY_SEC:-20}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    shm_size: 1gb
    volumes:
      - data:/app/data

volumes:
  pgdata:
  data:
