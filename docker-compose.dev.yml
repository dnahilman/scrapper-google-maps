# Local development compose — build image lokal + bind source untuk hot edit.
# Pre-req: .env.local berisi APP_URL + GOOGLE_MAPS_SYNC_API_KEY (lihat .env.example).
services:
  scraper:
    build:
      context: .
      args:
        MIN_DELAY_SEC: 5
        MAX_DELAY_SEC: 12
    image: scrapper:dev
    container_name: scrapper-dev
    # APP_URL + GOOGLE_MAPS_SYNC_API_KEY dari .env.local (runtime, no build bake)
    env_file:
      - .env.local
    volumes:
      # Hot edit source (no rebuild needed)
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./config.py:/app/config.py
      # Persistent runtime data — output JSON + progress.db per keyword tinggal di sini
      - ./data:/app/data
      - ./logs:/app/logs
    shm_size: 1g
    stdin_open: true
    tty: true
