# Production compose untuk VPS — pull image dari GHCR (no build, no Python di VPS)
# Usage di VPS:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
services:
  scraper:
    image: ghcr.io/dnahilman/scrapper-google-maps:latest
    container_name: scrapper-prod
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./progress.db:/app/progress.db
    shm_size: 1g
    mem_limit: 2g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
