# Production compose untuk VPS — pull image dari GHCR (no build, no Python di VPS).
# Pre-req di VPS: .env.local di /opt/scrapper-google-maps/ berisi APP_URL +
# GOOGLE_MAPS_SYNC_API_KEY. CI/CD bisa auto-write file ini dari GitHub Secrets.
services:
  scraper:
    image: ghcr.io/dnahilman/scrapper-google-maps:latest
    container_name: scrapper-prod
    restart: unless-stopped
    # APP_URL + GOOGLE_MAPS_SYNC_API_KEY runtime injection — tidak di-bake ke image.
    # .env.local opsional — kalau gak ada, env defaults di bawah cukup buat scrape-only.
    env_file:
      - path: .env.local
        required: false
    environment:
      # Scrape behavior
      - HEADLESS=${HEADLESS:-true}
      - MIN_DELAY_SEC=${MIN_DELAY_SEC:-15}
      - MAX_DELAY_SEC=${MAX_DELAY_SEC:-30}
      - MAX_REVIEWS_PER_SHOP=${MAX_REVIEWS_PER_SHOP:-200}
      - MAX_REVIEW_AGE_DAYS=${MAX_REVIEW_AGE_DAYS:-730}
      - SKIP_EMPTY_REVIEWS=${SKIP_EMPTY_REVIEWS:-true}
      - SORT_REVIEWS_BY_NEWEST=${SORT_REVIEWS_BY_NEWEST:-true}
      - MAX_CAPTCHA_RETRY=${MAX_CAPTCHA_RETRY:-2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Sync target endpoints — kosong default. Set via .env.local saat siap sync.
      - CAFE_SYNC_URL=${CAFE_SYNC_URL:-}
      - BARBERSHOP_SYNC_URL=${BARBERSHOP_SYNC_URL:-}
      # API key (secret) — set via .env.local saat siap sync ke API
      - GOOGLE_MAPS_SYNC_API_KEY=${GOOGLE_MAPS_SYNC_API_KEY:-}
    volumes:
      # Output JSON + progress.db per keyword tersimpan di ./data/<keyword>/
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      # Web UI FastAPI + Svelte. Sesuaikan kalau port 8000 sudah dipakai service lain.
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    shm_size: 1g
    mem_limit: 2g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
