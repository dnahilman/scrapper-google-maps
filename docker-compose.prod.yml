# Production compose untuk VPS — pull image dari GHCR (no build, no Python di VPS)
# Usage di VPS:
#   echo "KEYWORD=cafe" >> .env             # set keyword target sekali
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Ganti keyword runtime tanpa restart container:
#   docker exec -e KEYWORD=barbershop scrapper-prod python scripts/scraper.py --resume --auto-sync
services:
  scraper:
    image: ghcr.io/dnahilman/scrapper-google-maps:latest
    container_name: scrapper-prod
    restart: unless-stopped
    environment:
      KEYWORD: ${KEYWORD:-cafe}
    volumes:
      # Output JSON + progress.db per keyword tersimpan di ./data/<keyword>/
      - ./data:/app/data
      - ./logs:/app/logs
    shm_size: 1g
    mem_limit: 2g
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
