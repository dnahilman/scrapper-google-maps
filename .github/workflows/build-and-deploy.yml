name: Build & Deploy Scrapper

on:
  push:
    branches: [main]
  workflow_dispatch:
# Note: tag trigger 'v*' di-pindah ke .github/workflows/build.yml (build-only).
# Workflow ini fokus continuous deploy `latest` dari main ke VPS.

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Image generic — secret (APP_URL, GOOGLE_MAPS_SYNC_API_KEY) di-inject runtime
          # via .env.local di VPS, BUKAN di-bake ke image.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: SSH to VPS and redeploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_URL: ${{ secrets.APP_URL }}
          GOOGLE_MAPS_SYNC_API_KEY: ${{ secrets.GOOGLE_MAPS_SYNC_API_KEY }}
        with:
          host: ${{ secrets.VPS_HOST_IP }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: APP_URL,GOOGLE_MAPS_SYNC_API_KEY
          script: |
            set -e
            cd /opt/scrapper-google-maps
            # Tulis .env.local fresh dari GitHub Secrets — compose env_file akan baca ini
            cat > .env.local <<EOF
            APP_URL=${APP_URL}
            GOOGLE_MAPS_SYNC_API_KEY=${GOOGLE_MAPS_SYNC_API_KEY}
            EOF
            chmod 600 .env.local
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f --filter "until=168h"
            docker compose -f docker-compose.prod.yml ps
